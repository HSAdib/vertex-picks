<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Sora:wght@100..800&display=swap" rel="stylesheet">
    
    <!-- Primary Meta Tags -->
    <title>Vertex Picks | Premium Rajshahi Mangoes</title>
    <meta name="title" content="Vertex Picks | Premium Rajshahi Mangoes" />
    <meta name="description" content="Hand-picked, tree-bagged, and delivered flawlessly to your doorstep. Experience the premium standard of Rajshahi mangoes." />

    <!-- Open Graph / Facebook / WhatsApp -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://vertex-picks.vercel.app/" />
    <meta property="og:title" content="Vertex Picks | Premium Rajshahi Mangoes" />
    <meta property="og:description" content="Hand-picked, tree-bagged, and delivered flawlessly to your doorstep. Experience the premium standard." />
    <!-- This tells WhatsApp to use your Himsagar image as the preview thumbnail! -->
    <meta property="og:image" content="/himsagar.jpg" /> 

  </head>
  <body>
    <svg style="display: none">
      <filter id="container-glass" x="0%" y="0%" width="100%" height="100%">
        <feTurbulence type="fractalNoise" baseFrequency="0.008 0.008" numOctaves="2" seed="92" result="noise" />
        <feGaussianBlur in="noise" stdDeviation="0.02" result="blur" />
        <feDisplacementMap in="SourceGraphic" in2="blur" scale="77" xChannelSelector="R" yChannelSelector="G" />
      </filter>
    </svg>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
